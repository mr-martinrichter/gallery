backend:
  name: git-gateway
  branch: main

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Nastaveni"
    files:
      - name: "site"
        label: "Hlavni nastaveni"
        file: "src/_data/site.json"
        fields:
          - { name: "title", label: "Nazev webu", widget: "string" }
          - { name: "logo", label: "Logo", widget: "image" }
          - { name: "instagram", label: "Instagram URL", widget: "string" }

      - name: "about"
        label: "O mne"
        file: "src/_data/about.json"
        fields:
          - { name: "name_first", label: "Jmeno", widget: "string" }
          - { name: "name_last", label: "Prijmeni", widget: "string" }
          - { name: "photo", label: "Fotografie", widget: "image", required: false }
          - name: "tags"
            label: "Stitky"
            widget: "list"
            fields:
              - { name: "label", label: "Text", widget: "string" }
              - name: "color"
                label: "Barva"
                widget: "select"
                options:
                  - { label: "Cervena", value: "red" }
                  - { label: "Modra", value: "blue" }
                  - { label: "Zelena", value: "green" }
          - { name: "bio_main", label: "Bio hlavni", widget: "text" }
          - { name: "bio_detail", label: "Bio detail", widget: "text" }
          - { name: "email", label: "E-mail", widget: "string" }

      - name: "gallery"
        label: "Galerie"
        file: "src/_data/gallery.json"
        fields:
          - name: "items"
            label: "Dila"
            widget: "list"
            fields:
              - { name: "image", label: "Obrazek", widget: "image" }
              - { name: "label", label: "Nazev", widget: "string" }
              - name: "category"
                label: "Kategorie"
                widget: "select"
                options:
                  - "Painter"
                  - "Visual Experimentator"
                  - "Lithographer"
                  - "Photographer"
                  - "Stylist"
